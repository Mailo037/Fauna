<aside class="sidebar" id="sidebar" aria-label="Fauna navigation">
    <div class="logo">
        <span class="logo-icon">
            <img class="fauna-mark app-brand-icon" src="favicon.png?v=20260705-brand-icon" alt="" decoding="async" draggable="false">
        </span>
        <span class="logo-copy">
            <span class="logo-text">Fauna</span>
            <span class="logo-kicker">AI workspace</span>
        </span>
        <button id="sidebarCollapseToggle" class="sidebar-collapse-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true" data-tooltip="Collapse sidebar">
            <svg class="sidebar-collapse-icon sidebar-collapse-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                <path d="M9 4v16"></path>
                <path d="m16 9-3 3 3 3"></path>
            </svg>
            <svg class="sidebar-collapse-icon sidebar-collapse-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                <path d="M9 4v16"></path>
                <path d="m14 9 3 3-3 3"></path>
            </svg>
        </button>
    </div>

    <nav class="nav-links sidebar-section" aria-label="Workspace">
        <div class="sidebar-section-label">Workspace</div>
        <button id="playgroundNavButton" class="nav-item active" type="button" data-workspace-view="playground" data-tooltip="Playground" aria-current="page">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span class="nav-text">Playground</span>
            <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <button id="libraryNavButton" class="nav-item" type="button" data-workspace-view="library" data-tooltip="Library">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 19.5V5a2 2 0 0 1 2-2h4v18H6a2 2 0 0 1-2-1.5Z"></path>
                <path d="M10 3h8a2 2 0 0 1 2 2v14.5A2 2 0 0 1 18 21h-8"></path>
                <path d="M14 7h3"></path>
                <path d="M14 11h3"></path>
                <path d="M14 15h3"></path>
            </svg>
            <span class="nav-text">Library</span>
            <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <div class="new-chat-picker-wrap">
            <button id="newChat" class="history-item new-chat-item workspace-new-chat-item" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="composerProjectMenu" data-tooltip="New chat">
                <svg class="history-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span class="chat-label">New chat</span>
            </button>
        </div>
    </nav>

    <section class="projects-section sidebar-section" aria-label="Projects">
        <div class="projects-header-row">
            <button id="projectListToggle" class="history-header history-toggle projects-toggle" type="button" aria-label="Collapse projects" aria-expanded="true" aria-controls="projectList" data-tooltip="Collapse projects">
                <span class="history-label">Projects</span>
                <svg class="history-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="project-sort-wrap">
                <button id="projectSortBtn" class="sidebar-mini-btn project-sort-btn" type="button" aria-label="Sort projects" aria-haspopup="menu" aria-expanded="false" aria-controls="projectSortMenu" data-tooltip="Sort projects">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M11 5H4"></path>
                        <path d="M11 12H4"></path>
                        <path d="M11 19H4"></path>
                        <path d="m17 5 3 3 3-3"></path>
                        <path d="M20 8v11"></path>
                    </svg>
                </button>
                <div id="projectSortMenu" class="chat-session-menu project-sort-menu" role="menu" hidden></div>
            </div>
            <button id="addProjectFolderBtn" class="sidebar-mini-btn" type="button" aria-label="Add project folder" data-tooltip="Add project folder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 19V6.5A2.5 2.5 0 0 1 6.5 4H10l2 2h5.5A2.5 2.5 0 0 1 20 8.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"></path>
                    <path d="M12 10v6"></path>
                    <path d="M9 13h6"></path>
                </svg>
            </button>
        </div>
        <div id="projectList" class="project-list" aria-label="Project folders"></div>
    </section>

    <section class="history history-active sidebar-section" aria-label="Chats">
        <div class="chats-header-row">
            <button id="chatHistoryToggle" class="history-header history-toggle" type="button" aria-label="Collapse chats" aria-expanded="true" aria-controls="chatHistoryList" data-tooltip="Collapse chats">
                <span class="history-label">Chats</span>
                <svg class="history-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <button id="newNormalChatBtn" class="sidebar-mini-btn chat-start-btn" type="button" aria-label="Start normal chat" data-tooltip="Start normal chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"></path>
                    <path d="M12 7v6"></path>
                    <path d="M9 10h6"></path>
                </svg>
            </button>
        </div>
        <div id="chatHistoryList" class="chat-history-list" aria-label="Chat history"></div>
    </section>

    <section id="archivedHistorySection" class="history history-archived sidebar-section" aria-label="Archived chats" hidden>
        <button id="archivedChatToggle" class="history-header history-toggle" type="button" aria-label="Collapse archived chats" aria-expanded="true" aria-controls="archivedChatList" data-tooltip="Collapse archived">
            <span class="history-label">Archived</span>
            <svg class="history-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </button>
        <div id="archivedChatList" class="chat-history-list archived-chat-list" aria-label="Archived chat history"></div>
    </section>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
