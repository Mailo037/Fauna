<header id="appWindowBar" class="app-window-bar" aria-label="App navigation">
    <div class="window-bar-left">
        <button id="windowBackBtn" class="window-bar-icon-btn" type="button" aria-label="Go back" data-tooltip="Back" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m15 18-6-6 6-6"></path>
            </svg>
        </button>
        <button id="windowForwardBtn" class="window-bar-icon-btn" type="button" aria-label="Go forward" data-tooltip="Forward" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m9 18 6-6-6-6"></path>
            </svg>
        </button>
        <button id="settingsOpenBtn" class="window-bar-icon-btn window-settings-btn settings-open-btn" type="button" aria-label="Open settings" data-tooltip="Settings">
            <svg class="settings-open-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
                <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.36a1.7 1.7 0 0 0-1 .58V20a2 2 0 1 1-4 0v-.08a1.7 1.7 0 0 0-1-.58 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.64 15a1.7 1.7 0 0 0-.58-1H4a2 2 0 1 1 0-4h.08a1.7 1.7 0 0 0 .58-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.64a1.7 1.7 0 0 0 1-.58V4a2 2 0 1 1 4 0v.08a1.7 1.7 0 0 0 1 .58 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.36 9c.22.36.42.7.58 1H20a2 2 0 1 1 0 4h-.08a1.7 1.7 0 0 0-.52 1Z"></path>
            </svg>
        </button>
    </div>

    <div class="window-bar-center" aria-live="polite">
        <span class="window-bar-location-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3.5c3.8 0 7 2.9 7 6.8 0 4.9-4.6 8.4-6.4 9.5a1.1 1.1 0 0 1-1.2 0C9.6 18.7 5 15.2 5 10.3c0-3.9 3.2-6.8 7-6.8Zm0 4a2.7 2.7 0 1 0 0 5.4 2.7 2.7 0 0 0 0-5.4Z"></path>
            </svg>
        </span>
        <span id="windowLocationLabel" class="window-bar-location-label">Current Session</span>
    </div>

    <div class="window-bar-right">
        <div id="changelogMenuWrap" class="changelog-menu-wrap">
            <button id="changelogBtn" class="window-bar-icon-btn changelog-btn" type="button" aria-label="Open changelog" aria-expanded="false" aria-controls="changelogPanel" data-tooltip="Changelog">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M8 6h13"></path>
                    <path d="M8 12h13"></path>
                    <path d="M8 18h13"></path>
                    <path d="M3 6h.01"></path>
                    <path d="M3 12h.01"></path>
                    <path d="M3 18h.01"></path>
                </svg>
            </button>
            <div id="changelogPanel" class="changelog-panel" hidden>
                <header class="changelog-panel-head">
                    <div>
                        <strong>Changelog</strong>
                        <small id="changelogSummary">Recent desktop updates</small>
                    </div>
                </header>
                <div id="changelogList" class="changelog-list"></div>
            </div>
        </div>
        <div id="modelDownloadMenuWrap" class="model-download-menu-wrap" hidden>
            <button id="modelDownloadBtn" class="model-download-btn" type="button" aria-expanded="false" aria-controls="modelDownloadPanel" data-tooltip="Model downloads">
                <span class="model-download-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3v11"></path>
                        <path d="m7 10 5 5 5-5"></path>
                        <path d="M5 21h14"></path>
                    </svg>
                </span>
                <span id="modelDownloadLabel" class="model-download-label">Downloads</span>
                <span id="modelDownloadCount" class="model-download-count">0</span>
                <span class="model-download-mini-bar" aria-hidden="true">
                    <span id="modelDownloadMiniBar" class="model-download-mini-fill"></span>
                </span>
            </button>
            <div id="modelDownloadPanel" class="model-download-panel" hidden>
                <header class="model-download-panel-head">
                    <div>
                        <strong>Model downloads</strong>
                        <small id="modelDownloadSummary">No active downloads</small>
                    </div>
                </header>
                <div id="modelDownloadList" class="model-download-list"></div>
            </div>
        </div>
        <button id="statusPill" class="status-pill window-status-pill" type="button" data-tooltip="Local service status">
            <span class="pulse-dot" aria-hidden="true"></span>
            <span id="serviceStatusLabel">Ollama local</span>
        </button>
        <div id="windowUpdateNotice" class="window-update-notice" hidden>
            <span id="windowUpdateNoticeText">Update available</span>
            <button id="windowUpdateInstallBtn" class="window-update-install-btn" type="button">Install</button>
        </div>
        <button id="windowUpdateBtn" class="window-bar-icon-btn" type="button" aria-label="Check for updates" data-tooltip="Check updates">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.2 6.5"></path>
                <path d="M3 12A9 9 0 0 1 18.2 5.5"></path>
                <path d="M21 4v6h-6"></path>
                <path d="M3 20v-6h6"></path>
            </svg>
        </button>
        <div class="desktop-window-controls" aria-label="Window controls">
            <button id="windowMinimizeBtn" class="window-control-btn" type="button" aria-label="Minimize" data-tooltip="Minimize">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                    <path d="M6 12h12"></path>
                </svg>
            </button>
            <button id="windowMaximizeBtn" class="window-control-btn" type="button" aria-label="Maximize" data-tooltip="Maximize">
                <svg class="window-control-icon-maximize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linejoin="round" aria-hidden="true">
                    <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
                </svg>
                <svg class="window-control-icon-restore" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 7h8v8"></path>
                    <rect x="6" y="10" width="8" height="8" rx="1.4"></rect>
                </svg>
            </button>
            <button id="windowCloseBtn" class="window-control-btn window-control-close" type="button" aria-label="Close" data-tooltip="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                    <path d="M6 6l12 12"></path>
                    <path d="M18 6 6 18"></path>
                </svg>
            </button>
        </div>
    </div>
</header>
